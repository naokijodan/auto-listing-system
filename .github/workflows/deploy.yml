# =============================================================================
# RAKUDA Deploy (Coolify API)
# =============================================================================
# Deploys the application to production via Coolify API
# Triggered manually or after successful Docker build
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Services to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - worker
          - web

  workflow_run:
    workflows: ["Docker Build"]
    types:
      - completed
    branches: [main]

env:
  COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
  COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
  COOLIFY_API_UUID: ${{ secrets.COOLIFY_API_UUID }}
  COOLIFY_WORKER_UUID: ${{ secrets.COOLIFY_WORKER_UUID }}
  COOLIFY_WEB_UUID: ${{ secrets.COOLIFY_WEB_UUID }}

jobs:
  deploy:
    name: Deploy via Coolify
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Deploy API
        if: ${{ github.event.inputs.services == 'all' || github.event.inputs.services == 'api' || github.event_name == 'workflow_run' }}
        run: |
          echo "Deploying rakuda-api..."
          RESPONSE=$(curl -sf -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "$COOLIFY_API_URL/api/v1/deploy?uuid=$COOLIFY_API_UUID&force=true")
          echo "$RESPONSE" | jq .
          echo "API deployment queued."

      - name: Deploy Worker
        if: ${{ github.event.inputs.services == 'all' || github.event.inputs.services == 'worker' || github.event_name == 'workflow_run' }}
        run: |
          echo "Deploying rakuda-worker..."
          RESPONSE=$(curl -sf -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "$COOLIFY_API_URL/api/v1/deploy?uuid=$COOLIFY_WORKER_UUID&force=true")
          echo "$RESPONSE" | jq .
          echo "Worker deployment queued."

      - name: Deploy Web
        if: ${{ github.event.inputs.services == 'all' || github.event.inputs.services == 'web' || github.event_name == 'workflow_run' }}
        run: |
          echo "Deploying rakuda-web..."
          RESPONSE=$(curl -sf -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "$COOLIFY_API_URL/api/v1/deploy?uuid=$COOLIFY_WEB_UUID&force=true")
          echo "$RESPONSE" | jq .
          echo "Web deployment queued."

      - name: Wait for deployments
        run: |
          echo "Waiting 60s for deployments to complete..."
          sleep 60

      - name: Verify API health
        run: |
          echo "Checking API health..."
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.rakuda.dev/api/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "API health check passed."
          else
            echo "::warning::API health check returned $HTTP_STATUS (may still be deploying)"
          fi

      - name: Notify success
        if: success()
        run: echo "Coolify deployment triggered successfully."

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deployment failed! Check Coolify dashboard at $COOLIFY_API_URL"
          exit 1
